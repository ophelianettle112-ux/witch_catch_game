<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨まほうのキャッチゲーム✨</title>
<style>
  :root{
    --pink:#ff9ecf;
    --pink-deep:#ff6fb5;
    --purple:#c9a6ff;
    --purple-deep:#a273f2;
    --blue:#9ee8ff;
    --blue-deep:#5fd0ff;
    --yellow:#fff29e;
    --bg1:#f6d9ff;
    --bg2:#d9c2ff;
    --bg3:#b9a4ff;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; user-select:none; }
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Segoe UI Rounded','Hiragino Maru Gothic ProN','Rounded Mplus 1c','Comic Sans MS',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 50%,var(--bg3));
    overflow:hidden;
  }
  body{
    display:flex; align-items:center; justify-content:center; min-height:100vh;
  }

  /* 背景のキラキラ */
  #sparkle-bg{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .sparkle{
    position:absolute; font-size:20px; opacity:.7;
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ transform:scale(0.6) rotate(0deg); opacity:.2; }
    50%{ transform:scale(1.2) rotate(20deg); opacity:.9; }
  }

  #app{
    position:relative; z-index:1;
    width:min(760px,96vw);
  }
  @media (min-width:700px){
    #app{ width:min(900px,94vw); }
  }

  .screen{
    background:linear-gradient(160deg,#ffffffcc,#fff0fbcc);
    border-radius:32px;
    padding:14px;
    box-shadow:0 10px 30px rgba(150,90,220,.35), inset 0 0 0 4px #ffffffaa;
    backdrop-filter:blur(2px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .hidden{ display:none !important; }
  .fade-out{ opacity:0; transform:scale(.9); pointer-events:none; }
  .fade-in{ animation:fadeIn .6s ease both; }
  @keyframes fadeIn{ from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);} }


  /* ==== タイトル画面・サウンド ==== */
  #title-screen{
    position:relative; min-height:min(86vh,680px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; overflow:hidden; padding:48px 20px 34px;
  }
  .title-moon{
    position:absolute; width:280px; height:280px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#ffe9fa 48%,#d7c2ff 72%,transparent 74%);
    opacity:.72; filter:drop-shadow(0 0 24px rgba(255,255,255,.9));
    top:55px; left:50%; transform:translateX(-50%);
    pointer-events:none;
  }
  .title-content{
    position:relative; z-index:2; width:min(100%,520px);
    padding-top:58px;
  }
  #title-screen h1{
    margin:0 0 12px; font-size:clamp(29px,7vw,46px); line-height:1.25;
    background:linear-gradient(90deg,var(--pink-deep),var(--purple-deep),var(--blue-deep));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 4px 12px rgba(170,100,210,.15);
  }
  .title-witch{
    display:inline-block; font-size:clamp(72px,19vw,118px); margin:8px 0 4px;
    filter:drop-shadow(0 10px 12px rgba(80,40,120,.3));
    animation:titleFloat 2s ease-in-out infinite;
  }
  @keyframes titleFloat{ 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-9px) rotate(2deg)} }
  .title-lead{ margin:5px 0 18px; color:#7949b5; font-size:clamp(16px,4vw,21px); font-weight:900; line-height:1.55; }
  .title-tips{
    margin:0 auto 22px; width:min(100%,420px); display:grid; gap:8px;
  }
  .title-tip{
    background:rgba(255,255,255,.72); border-radius:16px; padding:8px 11px;
    color:#94549f; font-size:13px; font-weight:800; line-height:1.35;
    box-shadow:0 3px 8px rgba(140,80,180,.14);
  }
  #best3Panel{
    position:absolute; top:12px; left:50%; z-index:6;
    transform:translateX(-50%);
    width:150px; margin:0; padding:5px 8px;
    border-radius:14px; background:rgba(255,255,255,.78);
    box-shadow:0 3px 8px rgba(140,80,180,.14); color:#7a4bbf;
    text-align:center;
  }
  #best3Title{ font-size:11px; font-weight:900; margin-bottom:1px; white-space:nowrap; }
  #best3List{ display:flex; justify-content:center; gap:5px; flex-wrap:nowrap; font-size:11px; font-weight:900; white-space:nowrap; }
  .best3-empty{ opacity:.65; font-weight:800; }
  @media (max-width:430px){
    #best3Panel{ top:12px; width:132px; padding:5px 6px; }
    #best3Title,#best3List{ font-size:9.5px; }
  }
  @media (max-width:350px){
    #best3Panel{ width:120px; }
    #best3Title,#best3List{ font-size:9px; gap:3px; }
  }
  #highScoreNotice{
    margin:0 auto 7px; color:#ff5fa8; font-size:15px; font-weight:900;
    text-shadow:0 1px 2px #fff;
  }
  #startBtn{
    border:none; cursor:pointer; min-width:220px; min-height:64px;
    padding:12px 34px; border-radius:34px; color:#fff;
    font-size:21px; font-weight:900; letter-spacing:1px;
    background:linear-gradient(135deg,var(--pink-deep),var(--purple-deep));
    box-shadow:0 7px 0 #7748b0,0 11px 20px rgba(90,40,140,.28);
    transition:transform .08s,box-shadow .08s; touch-action:manipulation;
  }
  #startBtn:active{ transform:translateY(6px) scale(.98); box-shadow:0 1px 0 #7748b0; }
  .sound-btn{
    position:absolute; top:10px; left:22px; z-index:70;
    width:50px; height:50px; border-radius:50%; border:none;
    background:linear-gradient(135deg,#dff8ff,var(--blue),var(--purple));
    font-size:22px; cursor:pointer;
    box-shadow:0 5px 0 #7b9ed0,0 7px 10px rgba(0,0,0,.18);
    transition:transform .08s,box-shadow .08s; touch-action:manipulation;
  }
  .sound-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 #7b9ed0; }
  #countdownOverlay{
    position:absolute; inset:0; z-index:90; display:flex; align-items:center; justify-content:center;
    background:rgba(180,135,240,.16); backdrop-filter:blur(1px);
    pointer-events:none;
  }
  #countdownText{
    color:#fff; font-size:clamp(72px,20vw,130px); font-weight:900;
    text-shadow:0 5px 15px rgba(75,30,120,.5),0 0 22px #ffb6ec;
  }
  #countdownText.pop{ animation:countdownPop .72s ease both; }
  @keyframes countdownPop{
    0%{opacity:0;transform:scale(.45)}
    28%{opacity:1;transform:scale(1.15)}
    76%{opacity:1;transform:scale(1)}
    100%{opacity:0;transform:scale(.82)}
  }
  @media (max-width:430px){
    .sound-btn{left:16px}
    #title-screen{min-height:92vh;padding-top:54px}
    .title-content{padding-top:62px}
    .title-tip{font-size:12px}
  }
  @media (max-height:720px){
    #title-screen{justify-content:flex-start;padding-top:54px;padding-bottom:20px}
    .title-content{padding-top:58px}
    #title-screen h1{font-size:clamp(27px,6.4vw,40px);margin-bottom:6px}
    .title-witch{font-size:clamp(66px,17vw,100px);margin-top:2px}
    .title-lead{margin-bottom:12px}
    .title-tips{margin-bottom:14px;gap:6px}
  }

  /* ヘッダー */
  #header{
    position:relative;
    display:flex; align-items:center;
    min-height:64px; padding:6px 78px 10px 14px;
  }
  #header-right{
    position:absolute; left:50%; top:6px;
    transform:translateX(-50%);
    display:flex; align-items:center; justify-content:center;
    z-index:5;
  }
  .hud-pill{
    background:linear-gradient(135deg,var(--pink),var(--purple));
    color:#fff; font-weight:800; padding:8px 16px; border-radius:20px;
    box-shadow:0 4px 0 #b56fd9, 0 6px 10px rgba(0,0,0,.15);
    font-size:15px; letter-spacing:1px;
    text-shadow:0 1px 2px rgba(0,0,0,.25);
  }
  #timer{
    min-width:126px; text-align:center;
    padding:10px 20px; font-size:21px;
    letter-spacing:1.5px; white-space:nowrap;
  }
  @media (max-width:430px){
    #header{ min-height:62px; padding-left:10px; padding-right:68px; }
    #scoreBox{ padding:7px 10px; font-size:13px; }
    #timer{ min-width:108px; padding:9px 13px; font-size:19px; }
    .collection-btn{ right:16px; }
  }
  @media (max-width:350px){
    #scoreBox{ font-size:12px; padding:7px 8px; }
    #timer{ min-width:96px; font-size:17px; padding:9px 10px; }
  }
  #timer.warn{ background:linear-gradient(135deg,#ff8a8a,#ff5f8f); animation:pulseWarn .5s infinite; }
  @keyframes pulseWarn{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

  /* ゲームエリア */
  #game-area{
    position:relative;
    width:100%;
    height:min(74vh,700px);
    border-radius:24px;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 10%, #ffffff77, transparent 40%),
      linear-gradient(180deg,#e8d5ff,#c9b3ff 60%, #ad9cff);
    box-shadow:inset 0 0 0 3px #ffffffaa, inset 0 -10px 30px rgba(150,80,220,.25);
  }
  @media (min-width:700px){
    #game-area{ height:min(78vh,820px); }
  }
  .cloud{
    position:absolute; background:#ffffffb0; border-radius:50%;
    filter:blur(1px);
  }

  #player{
    position:absolute;
    bottom:10px;
    width:82px; height:82px;
    display:flex; align-items:center; justify-content:center;
    transform:translateX(-50%);
    transition:transform .05s linear;
    z-index:10;
  }
  @media (min-width:700px){ #player{ width:96px; height:96px; } }

  .player-aura{
    position:absolute; inset:-8px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,190,235,.95), rgba(210,170,255,.55) 55%, transparent 76%);
    filter:blur(2px);
    animation:auraPulse 1.8s ease-in-out infinite;
    z-index:0;
  }
  @keyframes auraPulse{
    0%,100%{ transform:scale(1); opacity:.8; }
    50%{ transform:scale(1.18); opacity:1; }
  }
  .player-sparkles{
    position:absolute; inset:0; z-index:1;
    animation:orbitSpin 5s linear infinite;
    pointer-events:none;
  }
  @keyframes orbitSpin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
  .spk{ position:absolute; font-size:15px; filter:drop-shadow(0 0 3px #fff); }
  .spk1{ top:-6px; left:50%; transform:translateX(-50%); }
  .spk2{ bottom:10px; left:-8px; }
  .spk3{ bottom:10px; right:-8px; }

  .player-emoji{
    position:relative; z-index:2;
    font-size:54px;
    filter:drop-shadow(0 6px 6px rgba(80,40,120,.4));
    animation:idleBounce 1.5s ease-in-out infinite;
  }
  @media (min-width:700px){ .player-emoji{ font-size:64px; } }
  @keyframes idleBounce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-5px); }
  }

  #player.move-left{ transform:translateX(-50%) rotate(-10deg) scaleX(-1); }
  #player.move-right{ transform:translateX(-50%) rotate(10deg); }

  .item{
    position:absolute;
    font-size:34px;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
    width:40px; height:40px;
    filter:drop-shadow(0 3px 4px rgba(60,20,90,.35));
    pointer-events:none;
  }
  .spike-item{
    width:42px; height:42px;
    background:radial-gradient(circle at 35% 30%, #7a2fb0, #2a0845 75%);
    clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    position:relative;
    animation:spikeWobble 0.9s ease-in-out infinite, spikeDanger 0.8s ease-in-out infinite;
  }
  /* 怒った目 */
  .spike-item::before{
    content:'';
    position:absolute;
    top:36%; left:29%;
    width:5px; height:7px;
    background:#fff;
    border-radius:50%;
    box-shadow:15px 0 0 #fff, 0 0 3px rgba(0,0,0,.6), 15px 0 3px rgba(0,0,0,.6);
  }
  /* への字の怒った口 */
  .spike-item::after{
    content:'';
    position:absolute;
    bottom:26%; left:50%;
    transform:translateX(-50%);
    width:14px; height:7px;
    border:2px solid #fff;
    border-top:none;
    border-radius:0 0 10px 10px;
  }
  @keyframes spikeWobble{
    0%,100%{ transform:rotate(-8deg) scale(1); }
    50%{ transform:rotate(8deg) scale(1.08); }
  }
  @keyframes spikeDanger{
    0%,100%{ box-shadow:0 0 6px 2px rgba(255,30,70,.65), 0 0 0 rgba(255,30,70,0); }
    50%{ box-shadow:0 0 16px 7px rgba(255,30,70,.95), 0 0 22px 4px rgba(255,30,70,.4); }
  }
  .warn-badge{
    position:absolute;
    top:-14px; left:50%;
    transform:translateX(-50%);
    font-size:14px;
    animation:badgeBounce .8s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes badgeBounce{
    0%,100%{ transform:translateX(-50%) translateY(0); }
    50%{ transform:translateX(-50%) translateY(-4px); }
  }

  .pop-score{
    position:absolute; font-weight:900; font-size:20px; pointer-events:none;
    text-shadow:0 2px 4px rgba(0,0,0,.3);
    animation:popFloat .8s ease forwards;
  }
  @keyframes popFloat{
    0%{ opacity:1; transform:translateY(0) scale(0.8);}
    30%{ transform:translateY(-10px) scale(1.2);}
    100%{ opacity:0; transform:translateY(-50px) scale(1);}
  }


  /* ==== にじいろキャンディ＆ボーナスタイム ==== */
  .rainbow-candy-item{
    width:52px; height:52px; font-size:31px; overflow:visible;
    filter:drop-shadow(0 0 7px rgba(255,255,255,.95)) drop-shadow(0 0 12px rgba(255,100,210,.75));
  }
  .rainbow-candy-item .candy-core{
    position:relative; z-index:3;
    animation:rainbowCandyPulse .9s ease-in-out infinite;
  }
  .rainbow-candy-item::before{
    content:''; position:absolute; inset:-4px; border-radius:50%;
    background:conic-gradient(#ff7eb9,#ffe36e,#8dffb5,#76ddff,#a98cff,#ff7eb9);
    opacity:.78; filter:blur(1px);
    animation:rainbowRingSpin 1.4s linear infinite;
  }
  .rainbow-candy-item::after{
    content:'✦'; position:absolute; right:-8px; top:-10px;
    color:#fff; font-size:16px; text-shadow:-30px 28px 0 #fff6a6, -5px 45px 0 #aef5ff;
    animation:rainbowTwinkle .8s ease-in-out infinite alternate;
    z-index:4;
  }
  @keyframes rainbowRingSpin{ to{ transform:rotate(360deg); } }
  @keyframes rainbowCandyPulse{
    0%,100%{ transform:scale(1) rotate(-5deg); }
    50%{ transform:scale(1.14) rotate(5deg); }
  }
  @keyframes rainbowTwinkle{ from{opacity:.45;transform:scale(.75);} to{opacity:1;transform:scale(1.15);} }

  #bonusHud{
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    z-index:26; min-width:180px; text-align:center;
    padding:8px 15px; border-radius:20px;
    color:#fff; font-size:15px; font-weight:900; letter-spacing:.5px;
    background:linear-gradient(90deg,#ff79ba,#ffdc65,#70e2ff,#a785ff,#ff79ba);
    background-size:220% 100%;
    box-shadow:0 4px 0 rgba(121,77,176,.55),0 6px 14px rgba(80,40,130,.25);
    text-shadow:0 1px 3px rgba(70,30,100,.45);
    animation:bonusHudFlow 1.4s linear infinite;
    pointer-events:none;
  }
  @keyframes bonusHudFlow{ to{background-position:220% 0;} }

  #gameAnnouncement{
    position:absolute; left:50%; top:42%; transform:translate(-50%,-50%);
    z-index:45; width:min(88%,440px); text-align:center;
    color:#fff; font-size:clamp(20px,5vw,34px); font-weight:900;
    line-height:1.25; text-shadow:0 3px 8px rgba(70,30,120,.55),0 0 10px #ff9fe7;
    pointer-events:none;
  }
  #gameAnnouncement.show{ animation:announcementPop 1.15s ease both; }
  #gameAnnouncement.small{ font-size:clamp(16px,4vw,24px); }
  @keyframes announcementPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.55);}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-65%) scale(.96);}
  }

  #player.rainbow-bonus .player-aura{
    background:conic-gradient(from 0deg,rgba(255,115,190,.82),rgba(255,229,105,.82),rgba(112,235,190,.82),rgba(100,215,255,.82),rgba(177,135,255,.82),rgba(255,115,190,.82));
    filter:blur(4px);
    animation:rainbowAuraSpin 1.2s linear infinite, auraPulse 1s ease-in-out infinite;
  }
  #player.rainbow-bonus .player-emoji{
    filter:drop-shadow(0 0 8px #fff) drop-shadow(0 6px 7px rgba(80,40,120,.45));
  }
  @keyframes rainbowAuraSpin{ to{transform:rotate(360deg) scale(1.14);} }

  .rainbow-trail{
    position:absolute; z-index:8; pointer-events:none;
    font-size:16px; font-weight:900;
    animation:rainbowTrailFade .65s ease-out forwards;
    filter:drop-shadow(0 0 4px #fff);
  }
  @keyframes rainbowTrailFade{
    0%{opacity:.95;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-90%) scale(.35) rotate(45deg);}
  }

  .guard-burst{
    position:absolute; z-index:35; width:52px; height:52px;
    pointer-events:none; transform:translate(-50%,-50%);
  }
  .guard-burst span{
    position:absolute; left:50%; top:50%; font-size:17px;
    animation:guardStarBurst .7s ease-out forwards;
  }
  @keyframes guardStarBurst{
    from{opacity:1;transform:translate(-50%,-50%) rotate(var(--a)) translateX(2px) scale(1);}
    to{opacity:0;transform:translate(-50%,-50%) rotate(var(--a)) translateX(42px) scale(.35);}
  }

  #rainbowGachaNote{
    position:relative; z-index:20; margin:-5px auto 8px;
    color:#9b4fb5; font-size:14px; font-weight:900;
    text-shadow:0 1px 2px #fff;
    animation:rainbowNoteIn .7s ease both;
  }
  @keyframes rainbowNoteIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:none}}

  #luckyHeartNote{
    position:relative; z-index:20; margin:-2px auto 9px;
    width:min(92%,430px); padding:8px 12px; border-radius:16px;
    color:#a53f78; font-size:14px; font-weight:900; line-height:1.35;
    background:linear-gradient(135deg,#fff8fc,#ffe0f1);
    box-shadow:0 3px 0 rgba(218,116,168,.28),0 6px 12px rgba(130,70,120,.12);
    text-shadow:0 1px 2px #fff;
    animation:rainbowNoteIn .7s ease both;
  }

  #capsule.rainbow-capsule{
    background:conic-gradient(from 10deg,#ff78b9,#ffe86d,#7ef0ba,#72dfff,#a88cff,#ff78b9);
    box-shadow:0 0 0 4px #ffffffdd,0 0 18px 7px rgba(255,137,224,.7),0 8px 16px rgba(90,40,140,.42);
  }
  #capsule.rainbow-capsule::before,
  #capsule.rainbow-capsule::after{
    position:absolute; color:#fff; font-size:15px;
    filter:drop-shadow(0 0 4px #fff);
    animation:capsuleStarTwinkle .8s ease-in-out infinite alternate;
  }
  #capsule.rainbow-capsule::before{ content:'✨'; left:-18px; top:-13px; }
  #capsule.rainbow-capsule::after{ content:'✦'; right:-14px; bottom:-9px; animation-delay:.25s; }
  @keyframes capsuleStarTwinkle{from{opacity:.45;transform:scale(.75)}to{opacity:1;transform:scale(1.2)}}

  .first-get{
    display:block; margin-bottom:7px; font-size:21px;
    color:#ff5fa8; text-shadow:0 1px 0 #fff;
  }

  /* 左右タップ操作ゾーン */
  .tap-zone{
    position:absolute; top:0; bottom:0; width:50%;
    z-index:30; touch-action:none;
    display:flex; align-items:center;
    background:transparent;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    user-select:none;
    outline:none;
    cursor:pointer;
  }
  .tap-zone-left{ left:0; justify-content:flex-start; }
  .tap-zone-right{ right:0; justify-content:flex-end; }
  .tap-zone.active{ background:transparent; }
  .tap-hint{
    font-size:34px; opacity:.4; margin:0 14px;
    animation:hintPulse 1.6s ease-in-out infinite;
    color:#fff; text-shadow:0 2px 6px rgba(90,40,140,.5);
  }
  @keyframes hintPulse{
    0%,100%{ opacity:.3; transform:translateX(0); }
    50%{ opacity:.65; }
  }
  .tap-zone-left .tap-hint{ animation-name:hintPulseLeft; }
  .tap-zone-right .tap-hint{ animation-name:hintPulseRight; }
  @keyframes hintPulseLeft{
    0%,100%{ opacity:.3; transform:translateX(0); }
    50%{ opacity:.65; transform:translateX(-4px); }
  }
  @keyframes hintPulseRight{
    0%,100%{ opacity:.3; transform:translateX(0); }
    50%{ opacity:.65; transform:translateX(4px); }
  }

  /* ==== ガチャ画面 ==== */
  #gacha-screen{ text-align:center; padding:14px 14px 16px; position:relative; min-height:0; height:min(94vh,700px); overflow:hidden; }
  #gacha-screen.result-open #machine-wrap,
  #gacha-screen.result-open #leverBtn{ display:none !important; }
  #gacha-screen.result-open #popup{ margin-top:10px; }
  #gacha-screen.result-open #restartBtn{ margin-top:10px; }
  #gacha-title{

    #fullscreenBtn{ right:72px; width:46px; height:46px; font-size:20px; }
  }


  /* ==== タブレット向け軽量化 ==== */
  body.low-power .screen{backdrop-filter:none;box-shadow:0 6px 16px rgba(120,70,180,.22),inset 0 0 0 2px #ffffff99}
  body.low-power .sparkle{animation:none;opacity:.42}
  body.game-active #sparkle-bg{display:none}
  body.low-power .title-witch,
  body.low-power .player-aura,
  body.low-power .player-sparkles,
  body.low-power .player-emoji,
  body.low-power .tap-hint,
  body.low-power #gacha-title,
  body.low-power #capsule.wiggle,
  body.low-power .completion-crown,
  body.low-power .completion-confetti span{animation:none!important}
  body.low-power .player-sparkles{display:none}
  body.low-power .player-aura{filter:none;opacity:.72}
  body.low-power .item{filter:none}
  body.low-power .rainbow-candy-item{filter:none}
  body.low-power .rainbow-candy-item::before{animation:none;filter:none;background:linear-gradient(135deg,#ff7eb9,#ffe36e,#76ddff,#a98cff)}
  body.low-power .rainbow-candy-item::after{animation:none}
  body.low-power #bonusHud{animation:none;background-size:100% 100%}
  body.low-power #player.rainbow-bonus .player-aura,
  body.low-power #player.grand-witch .player-aura{animation:none;filter:none;background:radial-gradient(circle,#ffe56f,#ff9ed1 48%,transparent 72%)}
  body.low-power #gacha-machine,
  body.low-power #gacha-machine.glow{filter:none}
  body.low-power #pauseOverlay{backdrop-filter:none}
  body.low-power .spike-item{animation:none;box-shadow:0 0 7px rgba(255,30,70,.75)}
  body.low-power .warn-badge{animation:none}
  body.low-power .rainbow-trail{display:none}
  .item{left:0!important;top:0!important;will-change:transform}
  #player{will-change:left}
  .screen.hidden *{animation-play-state:paused!important}
  #game-area.paused *{animation-play-state:paused!important}
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}
  }

</style>
</head>
<body>

<div id="sparkle-bg"></div>

<div id="app">

  <button id="soundBtn" class="sound-btn" title="おとをきりかえる" aria-label="おとをきりかえる">🔊</button>
  <button id="fullscreenBtn" title="ぜんがめん" aria-label="ぜんがめん">⛶</button>
  <button id="collectionBtn" class="collection-btn" title="コレクション" aria-label="コレクションをひらく">📖<span id="collectionBadge" class="collection-badge hidden">0</span></button>

  <!-- ================= タイトル画面 ================= -->
  <div class="screen" id="title-screen">
    <div class="title-moon"></div>
    <div class="title-content">
      <h1>✨まほうの<br>キャッチゲーム✨</h1>
      <div class="title-witch">🧙‍♀️</div>
      <p class="title-lead">キラキラアイテムを<br>たくさんキャッチしよう！</p>
      <div class="title-tips">
        <div class="title-tip">💖 ハートを5こあつめると<br>はじめてのアイテムがでやすいよ！</div>
        <div class="title-tip">🌈 にじいろキャンディは<br>とくべつなまほう！</div>
      </div>
      <div id="best3Panel" aria-label="ベスト3">
        <div id="best3Title">🏆 ベスト3</div>
        <div id="best3List"><span class="best3-empty">—</span></div>
      </div>
      <button id="startBtn">あそぶ！</button>
    </div>
  </div>

  <!-- ================= ゲーム画面 ================= -->
  <div class="screen hidden" id="game-screen">
    <div id="header">
      <div class="hud-pill" id="scoreBox">⭐ スコア <span id="scoreValue">0</span></div>
      <div id="header-right">
        <div class="hud-pill" id="timer">⏰ <span id="timeValue">60</span></div>
      </div>
      <button id="pauseBtn" title="いちじていし" aria-label="いちじていし" disabled>⏸</button>
    </div>

    <div id="game-area">
      <div id="countdownOverlay" class="hidden"><div id="countdownText"></div></div>
      <div id="pauseOverlay" class="hidden" role="dialog" aria-modal="true" aria-label="いちじていし">
        <div class="pause-card">
          <div class="pause-icon">🌙</div>
          <div class="pause-title">ちょっと おやすみ</div>
          <button id="resumeBtn">▶ つづける</button>
        </div>
      </div>
      <div id="heartGauge" aria-label="ラッキーハート 0こ"><span class="hearts" id="heartGaugeHearts">♡♡♡♡♡</span><span class="heart-total" id="heartGaugeTotal">×0</span></div>
      <div id="bonusHud" class="hidden">🌈 ボーナス あと<span id="bonusSeconds">5</span></div>
      <div id="gameAnnouncement" class="hidden"></div>
      <div id="player">
        <div class="player-aura"></div>
        <div class="player-sparkles">
          <span class="spk spk1">✨</span>
          <span class="spk spk2">💫</span>
          <span class="spk spk3">⭐</span>
        </div>
        <div class="player-emoji">🧙‍♀️</div>
      </div>

      <div class="tap-zone tap-zone-left" id="zoneLeft"><span class="tap-hint">◀</span></div>
      <div class="tap-zone tap-zone-right" id="zoneRight"><span class="tap-hint">▶</span></div>
    </div>
  </div>

  <!-- ================= ガチャ画面 ================= -->
  <div class="screen hidden" id="gacha-screen">
    <div id="gacha-title">✨ガチャタイム✨</div>
    <div id="highScoreNotice" class="hidden"></div>
    <div id="final-score"></div>
    <div id="playSummary" class="hidden"></div>
    <div id="rainbowGachaNote" class="hidden">🌈 にじいろキャンディの まほう！</div>
    <div id="luckyHeartNote" class="hidden"></div>

    <div id="machine-wrap">
      <div id="gacha-machine" aria-label="カプセルトイ">
        <div class="machine-dome">
          <span class="mini-capsule mc1"></span><span class="mini-capsule mc2"></span>
          <span class="mini-capsule mc3"></span><span class="mini-capsule mc4"></span>
          <span class="mini-capsule mc5"></span>
        </div>
        <div class="machine-body">
          <div class="machine-label">✨ まほうガチャ ✨</div>
          <div class="machine-handle-base"><div id="machineHandle"></div></div>
          <div class="machine-slot"></div>
        </div>
      </div>
      <div id="capsule" class="hidden" aria-label="カプセルをひらく">🎁</div>
    </div>

    <button id="leverBtn" disabled>ガチャガチャを<br>やる！</button>

    <div id="popup" class="hidden"></div>
    <button id="restartBtn" class="hidden">もういちど あそぶ！</button>
  </div>

</div>

<!-- ================= コレクションモーダル ================= -->
<div id="collectionModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2>📖 コレクション</h2>
    <div id="collectionCompleteBanner" class="hidden">✨ まほうずかん かんせい！ ✨</div>
    <div id="collectionGrid" class="collection-categories"></div>
    <button id="closeCollectionBtn" class="modal-close-btn">とじる</button>
    <div style="margin-top:10px;">
      <button id="resetCollectionBtn" style="border:none;background:none;color:#a983c9;font-size:12px;text-decoration:underline;cursor:pointer;">コレクションをリセットする</button>
    </div>
  </div>
</div>


<div id="completionOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="まほうずかん完成">
  <div class="completion-box">
    <div class="completion-confetti" aria-hidden="true">
      <span style="--a:0deg;--d:0s">✨</span><span style="--a:45deg;--d:.08s">⭐</span>
      <span style="--a:90deg;--d:.16s">💫</span><span style="--a:135deg;--d:.24s">🌟</span>
      <span style="--a:180deg;--d:.12s">✨</span><span style="--a:225deg;--d:.2s">⭐</span>
      <span style="--a:270deg;--d:.28s">💫</span><span style="--a:315deg;--d:.04s">🌟</span>
    </div>
    <div class="completion-crown">👑</div>
    <div class="completion-title">まほうずかん かんせい！</div>
    <p class="completion-text">🧙‍♀️ にじいろ大まじょに<br>レベルアップしたよ！</p>
    <button id="completionCloseBtn">やったね！</button>
  </div>
</div>


<script>
(function(){
  "use strict";

  /* ---------- 背景キラキラ生成 ---------- */
  const sparkleBg = document.getElementById('sparkle-bg');
  const sparkleEmojis = ['✨','⭐','💫','🌟'];
  const initialLowPower = ((navigator.maxTouchPoints || 0) > 0 && innerWidth <= 1024) ||
    ((navigator.hardwareConcurrency || 8) <= 4) ||
    (typeof navigator.deviceMemory === 'number' && navigator.deviceMemory <= 4);
  document.body.classList.toggle('low-power', initialLowPower);
  const sparkleCount = initialLowPower ? 4 : 6;
  for(let i=0;i<sparkleCount;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = sparkleEmojis[Math.floor(Math.random()*sparkleEmojis.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = (Math.random()*3)+'s';
    s.style.fontSize = (12+Math.random()*16)+'px';
    sparkleBg.appendChild(s);
  }

  /* ---------- 要素取得 ---------- */
  const gameScreen = document.getElementById('game-screen');
  const gachaScreen = document.getElementById('gacha-screen');
  const gameArea = document.getElementById('game-area');
  const player = document.getElementById('player');
  const scoreValueEl = document.getElementById('scoreValue');
  const timeValueEl = document.getElementById('timeValue');
  const timerBox = document.getElementById('timer');
  const zoneLeft = document.getElementById('zoneLeft');
  const zoneRight = document.getElementById('zoneRight');
  const bonusHud = document.getElementById('bonusHud');
  const bonusSecondsEl = document.getElementById('bonusSeconds');
  const gameAnnouncement = document.getElementById('gameAnnouncement');
  const rainbowGachaNote = document.getElementById('rainbowGachaNote');
  const luckyHeartNote = document.getElementById('luckyHeartNote');
  const titleScreen = document.getElementById('title-screen');
  const startBtn = document.getElementById('startBtn');
  const soundBtn = document.getElementById('soundBtn');
  const countdownOverlay = document.getElementById('countdownOverlay');
  const countdownText = document.getElementById('countdownText');
  const titleWitch = document.querySelector('.title-witch');
  const collectionCompleteBanner = document.getElementById('collectionCompleteBanner');
  const completionOverlay = document.getElementById('completionOverlay');
  const completionCloseBtn = document.getElementById('completionCloseBtn');
  const heartGauge = document.getElementById('heartGauge');
  const heartGaugeHearts = document.getElementById('heartGaugeHearts');
  const heartGaugeTotal = document.getElementById('heartGaugeTotal');
  const playSummary = document.getElementById('playSummary');
  const best3List = document.getElementById('best3List');
  const best3Title = document.getElementById('best3Title');
  const highScoreNotice = document.getElementById('highScoreNotice');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const resumeBtn = document.getElementById('resumeBtn');


  /* ---------- Web Audio API 効果音 ---------- */
  const SOUND_STORAGE_KEY = 'magicCatchGame.soundMuted.v1';
  let audioCtx = null;
  let soundMuted = false;

  try{ soundMuted = localStorage.getItem(SOUND_STORAGE_KEY) === '1'; }catch(_err){}

  function updateSoundButton(){
    soundBtn.textContent = soundMuted ? '🔇' : '🔊';
    soundBtn.setAttribute('aria-label', soundMuted ? 'おとをだす' : 'おとをけす');
    soundBtn.title = soundMuted ? 'おとをだす' : 'おとをけす';
  }

  function ensureAudio(){
    if(soundMuted) return null;
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if(!AudioContextClass) return null;
    if(!audioCtx) audioCtx = new AudioContextClass();
    if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    return audioCtx;
  }

  function tone(freq, duration=.09, type='sine', volume=.035, delay=0, endFreq=null){
    const ctx = ensureAudio();
    if(!ctx) return;
    const start = ctx.currentTime + delay;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    if(endFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(30,endFreq), start+duration);
    gain.gain.setValueAtTime(.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start+.012);
    gain.gain.exponentialRampToValueAtTime(.0001, start+duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(start); osc.stop(start+duration+.03);
  }

  function playSound(name){
    if(soundMuted) return;
    switch(name){
      case 'start':
        tone(523,.10,'sine',.035,0); tone(659,.11,'sine',.035,.10); tone(784,.18,'sine',.04,.21); break;
      case 'count':
        tone(440,.08,'sine',.025); break;
      case 'catch':
        tone(720,.07,'sine',.024,0,920); break;
      case 'heart':
        tone(523,.08,'sine',.03,0); tone(659,.09,'sine',.03,.07); tone(784,.13,'sine',.035,.14); break;
      case 'spike':
        tone(180,.16,'triangle',.028,0,95); break;
      case 'rainbow':
        tone(523,.10,'sine',.032,0); tone(659,.10,'sine',.032,.08); tone(784,.10,'sine',.035,.16); tone(1047,.20,'sine',.04,.24); break;
      case 'guard':
        tone(700,.07,'square',.018,0,1050); tone(1000,.10,'sine',.022,.06); break;
      case 'hurry':
        tone(660,.10,'triangle',.028,0); tone(660,.10,'triangle',.028,.15); break;
      case 'finish':
        tone(660,.12,'sine',.028,0); tone(523,.14,'sine',.028,.13); tone(392,.22,'sine',.03,.27); break;
      case 'gacha':
        for(let i=0;i<5;i++) tone(180+i*25,.055,'triangle',.018,i*.07,240+i*20); break;
      case 'open':
        tone(659,.09,'sine',.03,0); tone(784,.10,'sine',.032,.08); tone(988,.11,'sine',.034,.17); tone(1319,.22,'sine',.04,.27); break;
      case 'button':
        tone(520,.055,'sine',.018); break;
    }
  }

  function getFullscreenElement(){
    return document.fullscreenElement ||
           document.webkitFullscreenElement ||
           document.msFullscreenElement ||
           null;
  }

  function isFullscreenSupported(){
    const el = document.documentElement;
    return !!(
      el.requestFullscreen ||
      el.webkitRequestFullscreen ||
      el.msRequestFullscreen
    );
  }

  function updateFullscreenButton(){
    const active = !!getFullscreenElement();
    fullscreenBtn.textContent = active ? '🗗' : '⛶';
    fullscreenBtn.title = active ? 'ぜんがめんをおわる' : 'ぜんがめん';
    fullscreenBtn.setAttribute('aria-label', active ? 'ぜんがめんをおわる' : 'ぜんがめん');
  }

  async function toggleFullscreen(){
    try{
      const active = getFullscreenElement();
      if(active){
        if(document.exitFullscreen){
          await document.exitFullscreen();
        }else if(document.webkitExitFullscreen){
          document.webkitExitFullscreen();
        }else if(document.msExitFullscreen){
          document.msExitFullscreen();
        }
      }else{
        const el = document.documentElement;
        if(el.requestFullscreen){
          await el.requestFullscreen({ navigationUI:'hide' }).catch(()=>el.requestFullscreen());
        }else if(el.webkitRequestFullscreen){
          el.webkitRequestFullscreen();
        }else if(el.msRequestFullscreen){
          el.msRequestFullscreen();
        }
      }
    }catch(err){
      console.warn('全画面表示を切り替えられませんでした:', err);
    }
    updateFullscreenButton();
  }

  if(!isFullscreenSupported()){
    fullscreenBtn.classList.add('unsupported');
  }else{
    fullscreenBtn.addEventListener('click', ()=>{
      ensureAudio();
      playSound('button');
      toggleFullscreen();
    });
    document.addEventListener('fullscreenchange', updateFullscreenButton);
    document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
    document.addEventListener('MSFullscreenChange', updateFullscreenButton);
    updateFullscreenButton();
  }

  soundBtn.addEventListener('click', ()=>{
    soundMuted = !soundMuted;
    try{ localStorage.setItem(SOUND_STORAGE_KEY, soundMuted ? '1' : '0'); }catch(_err){}
    updateSoundButton();
    if(!soundMuted){ ensureAudio(); playSound('button'); }
  });
  updateSoundButton();

  /* ---------- ゲーム状態 ---------- */
  let score = 0;
  let timeLeft = 60;
  let luckyCount = 0;
  let playerX = 50; // %
  const playerSpeed = 96; // % per second
  const MAX_ITEMS = 8;
  const TARGET_FRAME_MS = 1000 / 30;
  let lowPowerMode = initialLowPower;
  let lastFrameAt = 0;
  let spawnAccumulator = 0;
  let timerAccumulator = 0;
  let bonusHudAccumulator = 0;
  let slowFrameCount = 0;
  const transientEffects = new Set();
  let moveLeft = false, moveRight = false;
  let items = [];
  let running = false;
  let capsuleOpened = false;
  let spawnTimer = null;
  let countdownTimer = null;
  let rafId = null;
  let startCountdownTimer = null;
  let countdownInProgress = false;
  let collectionCounts = {}; // 手に入れたアイテム名 -> 個数（プレイをまたいで保持）
  let playCounts = createEmptyPlayCounts();
  let heartMagicAnnounced = false;
  let previousPlayResult = null;
  let paused = false;
  let pauseResumeTimer = null;
  let pausedBonusRemainingMs = 0;

  // にじいろキャンディ／ボーナス状態
  let rainbowCandySpawnCount = 0;
  let rainbowCandyCollected = false;
  let bonusActive = false;
  let bonusEndAt = 0;
  let bonusTimer = null;
  let announcementTimer = null;
  let lastTrailAt = 0;
  const rainbowTrailEls = new Set();

  /* ---------- コレクションのブラウザ保存 ---------- */
  const COLLECTION_STORAGE_KEY = 'magicCatchGame.collection.v1';
  const COMPLETION_STORAGE_KEY = 'magicCatchGame.completionCelebrated.v1';
  const PREVIOUS_PLAY_STORAGE_KEY = 'magicCatchGame.previousPlay.v1';
  const HIGH_SCORES_STORAGE_KEY = 'magicCatchGame.highScores.v1';
  let highScores = [];

  function loadHighScores(){
    try{
      const raw = localStorage.getItem(HIGH_SCORES_STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      if(Array.isArray(parsed)){
        highScores = [...new Set(parsed.map(Number).filter(Number.isFinite))]
          .sort((a,b)=>b-a).slice(0,3);
      }
    }catch(err){
      console.warn('ハイスコアの読み込みに失敗しました:', err);
      highScores = [];
    }
  }

  function saveHighScores(){
    try{ localStorage.setItem(HIGH_SCORES_STORAGE_KEY, JSON.stringify(highScores)); }
    catch(err){ console.warn('ハイスコアの保存に失敗しました:', err); }
  }

  function renderHighScores(){
    best3Title.textContent = isCollectionComplete() ? '🌈 大まじょのきろく' : '🏆 ベスト3';
    if(highScores.length === 0){
      best3List.innerHTML = '<span class="best3-empty">—</span>';
      return;
    }
    best3List.innerHTML = highScores.map((value,index)=>`<span>${index+1}. ${value}てん</span>`).join('');
  }

  function registerHighScore(value){
    const beforeBest = highScores[0] ?? null;
    const wasKnown = highScores.includes(value);
    if(!wasKnown){
      highScores.push(value);
      highScores = [...new Set(highScores)].sort((a,b)=>b-a).slice(0,3);
      saveHighScores();
    }
    renderHighScores();
    return {
      isNewBest: beforeBest === null || value > beforeBest,
      enteredTop3: !wasKnown && highScores.includes(value),
      rank: highScores.indexOf(value) + 1
    };
  }

  function createEmptyPlayCounts(){
    return { star:0, drop:0, heart:0, spike:0, guard:0, rainbowCandy:0 };
  }

  function loadPreviousPlayResult(){
    try{
      const raw = localStorage.getItem(PREVIOUS_PLAY_STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && typeof parsed === 'object') previousPlayResult = parsed;
      }
    }catch(err){
      console.warn('前回結果の読み込みに失敗しました:', err);
    }
  }

  function savePreviousPlayResult(result){
    previousPlayResult = result;
    try{
      localStorage.setItem(PREVIOUS_PLAY_STORAGE_KEY, JSON.stringify(result));
    }catch(err){
      console.warn('前回結果の保存に失敗しました:', err);
    }
  }

  function loadCollection(){
    try{
      const raw = localStorage.getItem(COLLECTION_STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && typeof parsed === 'object') collectionCounts = parsed;
      }
    }catch(err){
      // プライベートブラウジング等で使えない場合はそのまま（今回のプレイ中だけ記憶）
      console.warn('コレクションの読み込みに失敗しました:', err);
    }
  }

  function saveCollection(){
    try{
      localStorage.setItem(COLLECTION_STORAGE_KEY, JSON.stringify(collectionCounts));
    }catch(err){
      console.warn('コレクションの保存に失敗しました:', err);
    }
  }

  const ITEM_TYPES = [
    { key:'star',  emoji:'⭐', points:10, weight:30 },
    { key:'drop',  emoji:'💧', points:10, weight:30 },
    { key:'spike', emoji:null, points:-5, weight:22, css:'spike-item' },
    { key:'heart', emoji:'💖', points:20, weight:18 }
  ];
  const RAINBOW_CANDY_TYPE = {
    key:'rainbowCandy', emoji:null, points:0, css:'rainbow-candy-item'
  };

  function pickItemType(){
    const total = ITEM_TYPES.reduce((s,t)=>s+t.weight,0);
    let r = Math.random()*total;
    for(const t of ITEM_TYPES){
      if(r < t.weight) return t;
      r -= t.weight;
    }
    return ITEM_TYPES[0];
  }


  function updateHeartGauge(){
    const filled = Math.min(5, luckyCount);
    heartGaugeHearts.textContent = '♥'.repeat(filled) + '♡'.repeat(5-filled);
    heartGaugeTotal.textContent = '×' + luckyCount;
    heartGauge.setAttribute('aria-label', `ラッキーハート ${luckyCount}こ`);
  }

  function celebrateHeartMagic(){
    if(heartMagicAnnounced || luckyCount < 5) return;
    heartMagicAnnounced = true;
    heartGauge.classList.remove('magic-ready');
    void heartGauge.offsetWidth;
    heartGauge.classList.add('magic-ready');
    showAnnouncement('💖 まほう！', true);
  }

  function renderPlaySummary(){
    playSummary.innerHTML =
      `<div class="summary-counts">`+
      `<span class="summary-chip">⭐×${playCounts.star}</span>`+
      `<span class="summary-chip">💧×${playCounts.drop}</span>`+

  function clearRainbowTrails(){
    rainbowTrailEls.forEach(el => el.remove());
    rainbowTrailEls.clear();
  }

  function createRainbowTrail(){
    const now = performance.now();
    if(lowPowerMode || !bonusActive || now - lastTrailAt < 150 || rainbowTrailEls.size >= 5) return;
    lastTrailAt = now;
    const trail = document.createElement('span');
    trail.className = 'rainbow-trail';
    trail.textContent = ['✨','⭐','✦','💫'][Math.floor(Math.random()*4)];
    trail.style.left = ((playerX/100)*gameArea.clientWidth) + 'px';

    gameArea.appendChild(trail);
    rainbowTrailEls.add(trail);
    setTimeout(()=>{
      trail.remove();
      rainbowTrailEls.delete(trail);
    }, 700);

  function updateBonusHud(){
    if(!bonusActive) return;
    const remainingMs = Math.max(0, bonusEndAt - Date.now());
    const seconds = Math.max(1, Math.ceil(remainingMs / 1000));
    bonusSecondsEl.textContent = seconds;
    if(remainingMs <= 0 || !running){
      stopBonus(running);
    }
  }

  function startBonus(){
    const wasActive = bonusActive;
    const durationSeconds = Math.max(1, Math.min(5, timeLeft));
    bonusActive = true;
    bonusEndAt = Date.now() + durationSeconds * 1000;
    rainbowCandyCollected = true;
    player.classList.add('rainbow-bonus');
    bonusHud.classList.remove('hidden');
    bonusSecondsEl.textContent = durationSeconds;
    clearInterval(bonusTimer);
    bonusTimer = null;
    bonusHudAccumulator = 0;
    showAnnouncement(wasActive ? '🌈 ボーナスつづくよ！' : '🌈 にじいろボーナス！');

  function stopBonus(showEndMessage=true){
    if(!bonusActive && bonusHud.classList.contains('hidden')) return;
    bonusActive = false;
    bonusEndAt = 0;
    clearInterval(bonusTimer);
    bonusTimer = null;
    bonusHud.classList.add('hidden');
    player.classList.remove('rainbow-bonus');

  function createGuardBurst(x,y){
    const burst = document.createElement('div');
    burst.className = 'guard-burst';

      burst.appendChild(star);

    transientEffects.add(burst);
    setTimeout(()=>{ burst.remove(); transientEffects.delete(burst); }, 650);

  function animateCountdownValue(value){

  function pauseGame(isAutomatic=false){
    if(!running || paused || countdownInProgress) return;
    paused = true;
    running = false;
    moveLeft = false;
    moveRight = false;
    player.classList.remove('move-left','move-right');
    clearInterval(spawnTimer);

    spawnTimer = null;
    countdownTimer = null;
    rafId = null;

    if(bonusActive){
      pausedBonusRemainingMs = Math.max(0, bonusEndAt - Date.now());

  function resumeGameWithCountdown(){
    if(!paused || countdownInProgress) return;
    pauseOverlay.classList.add('hidden');
    countdownOverlay.classList.remove('hidden');
    countdownInProgress = true;

    let count = 3;
    animateCountdownValue(count);
    playSound('count');

    clearInterval(pauseResumeTimer);
    pauseResumeTimer = setInterval(()=>{
      count--;
      if(count > 0){
        animateCountdownValue(count);
        playSound('count');
      }else if(count === 0){
        animateCountdownValue('スタート！');
        playSound('start');
      }else{
        clearInterval(pauseResumeTimer);
        pauseResumeTimer = null;
        countdownInProgress = false;
        countdownOverlay.classList.add('hidden');
        countdownText.textContent = '';
        gameArea.classList.remove('paused');
        paused = false;
        running = true;
        pauseBtn.disabled = false;

        if(bonusActive && pausedBonusRemainingMs > 0){
          bonusEndAt = Date.now() + pausedBonusRemainingMs;
          pausedBonusRemainingMs = 0;
          clearInterval(bonusTimer);
          bonusTimer = null;
          bonusHudAccumulator = 0;
          updateBonusHud();
        }

        document.body.classList.add('game-active');
        lastFrameAt = 0;
        rafId = requestAnimationFrame(gameLoop);
      }
    }, 760);

    resetGame();
    running = false;

    gameScreen.classList.remove('hidden','fade-out');
    countdownOverlay.classList.remove('hidden');

    let count = 3;
    animateCountdownValue(count);
    playSound('count');

    startCountdownTimer = setInterval(()=>{
      count--;
      if(count > 0){
        animateCountdownValue(count);
        playSound('count');
      }else if(count === 0){
        animateCountdownValue('スタート！');
        playSound('start');
      }else{
        clearInterval(startCountdownTimer);
        startCountdownTimer = null;
        countdownInProgress = false;

  function startGame(){
    resetGame();

  function tickTimer(){
    timeLeft--;
    timeValueEl.textContent = timeLeft;
    if(timeLeft <= 10) timerBox.classList.add('warn');
    if(timeLeft === 10) playSound('hurry');
    if(timeLeft <= 0){
      endGame();
    }
  }

  function spawnItem(){
    if(!running || items.length >= MAX_ITEMS) return;

    const elapsedSeconds = 60 - timeLeft;
    const rescueChance = (elapsedSeconds >= 25 && rainbowCandySpawnCount === 0) ? 0.085 : 0.027;
    const canSpawnRainbow = timeLeft > 3 && rainbowCandySpawnCount < 3;
    const type = (canSpawnRainbow && Math.random() < rescueChance)
      ? RAINBOW_CANDY_TYPE
      : pickItemType();

    if(type.key === 'rainbowCandy') rainbowCandySpawnCount++;

    const el = document.createElement('div');
    el.className = 'item' + (type.css ? ' '+type.css : '');
    if(type.key === 'rainbowCandy'){
      const core = document.createElement('span');
      core.className = 'candy-core';
      core.textContent = '🍭';
      el.appendChild(core);
    }else if(type.emoji){
      el.textContent = type.emoji;
    }
    if(type.key === 'spike'){
      const badge = document.createElement('span');
      badge.className = 'warn-badge';
      badge.textContent = '⚠️';
      el.appendChild(badge);
    }

    const areaWidth = gameArea.clientWidth;
    const x = 20 + Math.random()*(areaWidth-60);

    el.style.transform = `translate3d(${x}px,-52px,0)`;
    gameArea.appendChild(el);

    let vy;
    if(type.key === 'spike') vy = 2.05 + Math.random()*.55;
    else if(type.key === 'rainbowCandy') vy = 1.42 + Math.random()*.52;
    else vy = 1.6 + Math.random()*1.1;

    items.push({
      el, baseX:x, x, y:-52, vy,
      swayAmp: type.key === 'spike' ? 0 : type.key === 'rainbowCandy' ? 5+Math.random()*4 : 12+Math.random()*14,
      swayPhase: Math.random()*Math.PI*2,
      type
    });
  }

  function gameLoop(now){
    if(!running) return;
    if(!lastFrameAt){ lastFrameAt = now; rafId = requestAnimationFrame(gameLoop); return; }
    const rawDelta = Math.min(80, now - lastFrameAt);
    if(rawDelta < TARGET_FRAME_MS){ rafId = requestAnimationFrame(gameLoop); return; }
    lastFrameAt = now;
    const dt = rawDelta / 1000;

    if(rawDelta > 48) slowFrameCount++; else slowFrameCount = Math.max(0, slowFrameCount - 1);
    if(!lowPowerMode && slowFrameCount > 24){
      lowPowerMode = true;
      document.body.classList.add('low-power');
      clearRainbowTrails();
    }

    spawnAccumulator += rawDelta;
    timerAccumulator += rawDelta;
    bonusHudAccumulator += rawDelta;
    while(spawnAccumulator >= 650){ spawnAccumulator -= 650; spawnItem(); }
    while(timerAccumulator >= 1000 && running){ timerAccumulator -= 1000; tickTimer(); }
    if(bonusActive && bonusHudAccumulator >= 250){ bonusHudAccumulator = 0; updateBonusHud(); }
    if(!running) return;

    if(moveLeft !== moveRight){ playerX += (moveRight ? 1 : -1) * playerSpeed * dt; }
    playerX = Math.max(6, Math.min(94, playerX));
    player.style.left = playerX+'%';
    player.classList.toggle('move-left', moveLeft && !moveRight);
    player.classList.toggle('move-right', moveRight && !moveLeft);
    if(bonusActive && (moveLeft || moveRight)) createRainbowTrail();

    const areaW = gameArea.clientWidth;
    const areaH = gameArea.clientHeight;
    const playerPxX = (playerX/100)*areaW;
    const playerTopY = areaH - 70;
    const swayTime = now / 260;

    for(let i=items.length-1;i>=0;i--){
      const it = items[i];
      it.y += it.vy * 60 * dt;
      const sway = Math.sin(swayTime + it.swayPhase) * it.swayAmp;
      it.x = Math.max(8, Math.min(areaW - 48, it.baseX + sway));
      it.el.style.transform = `translate3d(${it.x}px,${it.y}px,0)`;

      const caught = it.y+36 >= playerTopY && it.y <= areaH-10 && Math.abs(it.x - playerPxX) < 42;
      if(caught){
        handleCatch(it); it.el.remove(); items.splice(i,1); continue;
      }
      if(it.y > areaH+20){ it.el.remove(); items.splice(i,1); }
    }
    rafId = requestAnimationFrame(gameLoop);
  }

  function handleCatch(it){
    if(it.type.key === 'rainbowCandy'){
      playCounts.rainbowCandy++;
      playSound('rainbow');
      startBonus();
      const pop = document.createElement('div');
      pop.className = 'pop-score';
      pop.textContent = '🌈 ボーナス！';
      pop.style.color = '#fff';
      pop.style.left = it.x+'px';
      pop.style.top = it.y+'px';
      gameArea.appendChild(pop); transientEffects.add(pop);
      setTimeout(()=>{pop.remove();transientEffects.delete(pop);}, 650);
      return;
    }

    if(it.type.key === 'spike' && bonusActive){
      playCounts.guard++;
      playSound('guard');
      createGuardBurst(it.x + 20, it.y + 20);
      const guard = document.createElement('div');
      guard.className = 'pop-score';
      guard.textContent = '🛡️ まほうでガード！';
      guard.style.color = '#fff';
      guard.style.fontSize = '17px';
      guard.style.left = Math.max(8,it.x-36)+'px';
      guard.style.top = it.y+'px';
      gameArea.appendChild(guard); transientEffects.add(guard);
      setTimeout(()=>{guard.remove();transientEffects.delete(guard);}, 700);
      return;
    }

    if(it.type.key === 'star') playCounts.star++;
    if(it.type.key === 'drop') playCounts.drop++;
    if(it.type.key === 'heart') playCounts.heart++;
    if(it.type.key === 'spike') playCounts.spike++;

    const multiplier = bonusActive && it.type.points > 0 ? 2 : 1;
    const awardedPoints = it.type.points * multiplier;
    score += awardedPoints;
    if(score < 0) score = 0;
    scoreValueEl.textContent = score;
    if(it.type.key === 'heart'){
      luckyCount++;
      updateHeartGauge();
      celebrateHeartMagic();
      playSound('heart');
    }else if(it.type.key === 'spike'){
      playSound('spike');
    }else{
      playSound('catch');
    }

    const pop = document.createElement('div');
    pop.className = 'pop-score';
    pop.textContent = (awardedPoints>0?'+':'') + awardedPoints + (multiplier === 2 ? ' ×2' : '');
    pop.style.color = awardedPoints>0 ? '#ff5fa8' : '#8a3fd6';
    pop.style.left = it.x+'px';
    pop.style.top = it.y+'px';
    gameArea.appendChild(pop); transientEffects.add(pop);
    setTimeout(()=>{pop.remove();transientEffects.delete(pop);}, 650);

    // キャッチ時のプレイヤーぷにっと演出
    if(!lowPowerMode && player.animate) player.animate([
      { transform: player.classList.contains('move-left') ? 'translateX(-50%) rotate(-12deg) scaleX(-1) scale(1)'
        : player.classList.contains('move-right') ? 'translateX(-50%) rotate(12deg) scale(1)'
        : 'translateX(-50%) scale(1)' },
      { transform: player.classList.contains('move-left') ? 'translateX(-50%) rotate(-12deg) scaleX(-1) scale(1.25)'
        : player.classList.contains('move-right') ? 'translateX(-50%) rotate(12deg) scale(1.25)'
        : 'translateX(-50%) scale(1.25)' },
      { transform: player.classList.contains('move-left') ? 'translateX(-50%) rotate(-12deg) scaleX(-1) scale(1)'
        : player.classList.contains('move-right') ? 'translateX(-50%) rotate(12deg) scale(1)'
        : 'translateX(-50%) scale(1)' }
    ], { duration:220, easing:'ease-out' });
  }

  function endGame(){
    playSound('finish');
    running = false;

    pauseBtn.disabled = true;

  /* ---------- ガチャ演出 ---------- */
  function startGachaSequence(){
    gachaScreen.classList.remove('result-open');
    const machineWrap = document.getElementById('machine-wrap');
    const machine = document.getElementById('gacha-machine');
    const leverBtn = document.getElementById('leverBtn');
    leverBtn.disabled = true;
    rainbowGachaNote.classList.toggle('hidden', !rainbowCandyCollected);

    if(luckyCount >= 8){
      luckyHeartNote.textContent = '💖 はじめてが とっても でやすい！';
      luckyHeartNote.classList.remove('hidden');
    }else if(luckyCount >= 5){
      luckyHeartNote.textContent = '💖 はじめてが でやすい！';
      luckyHeartNote.classList.remove('hidden');
    }else{
      luckyHeartNote.textContent = '';
      luckyHeartNote.classList.add('hidden');
    }

    const count = Math.max(luckyCount, 0);
    if(count === 0){
      leverBtn.disabled = false;
      return;
    }

    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const heart = document.createElement('div');
        heart.className = 'flying-heart';
        heart.textContent = '💖';
        const startX = 30 + Math.random()*(machineWrap.clientWidth-60);
        heart.style.left = startX+'px';
        heart.style.top = '0px';
        machineWrap.appendChild(heart);

        const machineRect = machine.getBoundingClientRect();
        const wrapRect = machineWrap.getBoundingClientRect();
        const targetX = (machineRect.left + machineRect.width/2) - wrapRect.left - 12;
        const targetY = (machineRect.top + machineRect.height*0.28) - wrapRect.top;

        heart.animate([
          { transform:`translate(0px,0px) scale(1)`, opacity:1 },
          { transform:`translate(${targetX-startX}px, ${targetY}px) scale(.3)`, opacity:.2 }
        ], { duration:450, easing:'cubic-bezier(.4,0,.7,1)' }).onfinish = () => {
          heart.remove();
          machine.animate([
            { transform:'scale(1)' }, { transform:'scale(1.04)' }, { transform:'scale(1)' }
          ], { duration:200 });
        };
      }, i*300);
    }

    setTimeout(()=>{
      leverBtn.disabled = false;
    }, count*300 + 500);
  }

    { icon:'🦋', name:'きらきらちょうちょ', category:'どうぶつ' },
    { icon:'🧁', name:'まほうのカップケーキ', category:'たべもの' },
    { icon:'💎', name:'にじいろほうせき', category:'まほう' },
    { icon:'🐣', name:'ちいさなひよこ', category:'どうぶつ' },
    { icon:'🌙', name:'おつきさまチャーム', category:'そら・ふしぎ' },
    { icon:'🫧', name:'ゆめいろしゃぼんだま', category:'そら・ふしぎ' },
    { icon:'🐬', name:'おほしさまイルカ', category:'そら・ふしぎ' }
  ];

  function updateCollectionBadge(){
    const total = Object.values(collectionCounts).reduce((s,n)=>s+n,0);
    const badge = document.getElementById('collectionBadge');
    badge.textContent = total;
    badge.classList.toggle('hidden', total <= 0);
  }

  function renderCollectionGrid(){
    const grid = document.getElementById('collectionGrid');
    grid.innerHTML = '';
    const categories = ['どうぶつ','おしゃれ','たべもの','まほう','そら・ふしぎ'];
    categories.forEach(category => {
      const prizes = PRIZES.filter(prize => prize.category === category);
      const owned = prizes.filter(prize => (collectionCounts[prize.name] || 0) > 0).length;

      const section = document.createElement('section');
      section.className = 'collection-category';

      const title = document.createElement('div');
      title.className = 'collection-category-title' + (owned === prizes.length ? ' complete' : '');
      title.innerHTML = `<span>${owned === prizes.length ? '⭐ ' : ''}${category}</span><span>${owned}/${prizes.length}</span>`;
      section.appendChild(title);

      const categoryGrid = document.createElement('div');
      categoryGrid.className = 'collection-grid';
      prizes.forEach(prize => {
        const count = collectionCounts[prize.name] || 0;
        const card = document.createElement('div');
        card.className = 'collection-card' + (count === 0 ? ' locked' : '');
        card.innerHTML =
          `<span class="icon">${count > 0 ? prize.icon : '❓'}</span>` +
          `<span>${count > 0 ? prize.name : 'ひみつ'}</span>` +
          (count > 0 ? `<span class="count">×${count}</span>` : '');
        categoryGrid.appendChild(card);
      });
      section.appendChild(categoryGrid);
      grid.appendChild(section);
    });
  }

  document.getElementById('collectionBtn').addEventListener('click', () => {
    applyGrandWitchState();
    renderCollectionGrid();
    document.getElementById('collectionModal').classList.remove('hidden');
  });
  document.getElementById('closeCollectionBtn').addEventListener('click', () => {
    document.getElementById('collectionModal').classList.add('hidden');
  });
  document.getElementById('resetCollectionBtn').addEventListener('click', () => {
    if(confirm('コレクションをぜんぶリセットしますか？あとでもどせません。')){
      collectionCounts = {};
      saveCollection();
      try{ localStorage.removeItem(COMPLETION_STORAGE_KEY); }catch(_err){}
      applyGrandWitchState();
      renderHighScores();
      updateCollectionBadge();
      renderCollectionGrid();
      document.getElementById('collectionBadge').classList.add('hidden');
    }
  });

  function getUnownedPrizes(){
    return PRIZES.filter(prize => (collectionCounts[prize.name] || 0) <= 0);
  }

  function pickGachaPrize(){
    let unownedPriority = 0;
    if(luckyCount >= 8) unownedPriority = 0.80;
    else if(luckyCount >= 5) unownedPriority = 0.60;

    const unownedPrizes = getUnownedPrizes();
    if(unownedPriority > 0 && unownedPrizes.length > 0 && Math.random() < unownedPriority){
      return unownedPrizes[Math.floor(Math.random() * unownedPrizes.length)];
    }
    return PRIZES[Math.floor(Math.random() * PRIZES.length)];
  }

  function openCapsule(el){
    if(capsuleOpened) return;
    capsuleOpened = true;
    playSound('open');
    el.dataset.opened = '1';
    el.classList.remove('wiggle');
    el.style.transform = 'translateX(-50%) scale(1.3) rotate(15deg)';
    el.style.transition = 'transform .25s ease';

    const prize = pickGachaPrize();
    const wasComplete = isCollectionComplete();
    const previousCount = collectionCounts[prize.name] || 0;
    const isFirst = previousCount === 0;
    const newCount = previousCount + 1;
    collectionCounts[prize.name] = newCount;
    saveCollection();
    updateCollectionBadge();
    applyGrandWitchState();
    renderHighScores();
    const justCompleted = !wasComplete && isCollectionComplete();

    const popup = document.getElementById('popup');
    if(isFirst){
      popup.innerHTML =
        `<span class="first-get">✨ はじめて！ ✨</span>` +
        `🎉 ${prize.icon} ${prize.name} を てにいれたよ！`;
    }else{
      popup.innerHTML =
        `🎉 ${prize.icon} ${prize.name} を てにいれたよ！<br>` +
        `これで ×${newCount}`;
    }
    setTimeout(()=>{
      gachaScreen.classList.add('result-open');
      popup.classList.remove('hidden');
      document.getElementById('restartBtn').classList.remove('hidden');
      if(justCompleted){
        try{ localStorage.setItem(COMPLETION_STORAGE_KEY, '1'); }catch(_err){}
        setTimeout(showCompletionCelebration, 650);
      }
    }, 240);

    // 今後の段階解放に利用できるよう、所持種類数をここで取得可能
    console.info('コレクション所持種類数:', getUniqueCollectionCount());
  }

  const capsuleEl = document.getElementById('capsule');
  // クリックとタッチの両方に対応（スマホでタップが反応しないことがあるための対策）
  capsuleEl.addEventListener('click', function(){ openCapsule(this); });
  capsuleEl.addEventListener('touchend', function(e){
    e.preventDefault(); // タッチ後に発生する重複clickを防止
    openCapsule(this);
  }, {passive:false});

  completionCloseBtn.addEventListener('click', ()=>{
    playSound('button');
    completionOverlay.classList.add('hidden');
    renderCollectionGrid();
  });

  document.getElementById('restartBtn').addEventListener('click', ()=>{ playSound('button'); startGameWithCountdown(); });

  /* ---------- 操作: キーボード ---------- */
  window.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
    if(e.key === 'ArrowLeft') moveLeft = true;
    if(e.key === 'ArrowRight') moveRight = true;
  }, {passive:false});
  window.addEventListener('keyup', (e)=>{
    if(e.key === 'ArrowLeft') moveLeft = false;
    if(e.key === 'ArrowRight') moveRight = false;
  });

  /* ---------- 操作: 画面タップ（左半分＝左、右半分＝右） ---------- */
  function bindZone(zoneEl, setter){
    let activePointerId = null;
    const start = (e) => {
      if(!running || activePointerId !== null) return;
      e.preventDefault();
      activePointerId = e.pointerId;
      try{ zoneEl.setPointerCapture(e.pointerId); }catch(_err){}
      setter(true);
      zoneEl.classList.add('active');
    };
    const end = (e) => {
      if(activePointerId !== null && e && e.pointerId !== activePointerId) return;
      setter(false);
      zoneEl.classList.remove('active');
      if(activePointerId !== null){
        try{ zoneEl.releasePointerCapture(activePointerId); }catch(_err){}
      }
      activePointerId = null;
    };
    zoneEl.addEventListener('pointerdown', start, {passive:false});
    zoneEl.addEventListener('pointerup', end);
    zoneEl.addEventListener('pointercancel', end);
    zoneEl.addEventListener('lostpointercapture', end);
    zoneEl.addEventListener('contextmenu', e => e.preventDefault());
    zoneEl.addEventListener('dragstart', e => e.preventDefault());
  }
  bindZone(zoneLeft, v => moveLeft = v);
  bindZone(zoneRight, v => moveRight = v);


  window.addEventListener('resize', ()=>{
    if(items.length){ items.forEach(it=>it.baseX=Math.max(20,Math.min(gameArea.clientWidth-60,it.baseX))); }
  }, {passive:true});
  window.addEventListener('pointerup', ()=>{ moveLeft=false; moveRight=false; }, {passive:true});
  window.addEventListener('pointercancel', ()=>{ moveLeft=false; moveRight=false; }, {passive:true});

  /* ---------- スタート ---------- */
  loadCollection();
  loadPreviousPlayResult();
  loadHighScores();
  updateCollectionBadge();
  applyGrandWitchState();
  renderHighScores();
  updateHeartGauge();
  gameScreen.classList.add('hidden');
  gachaScreen.classList.add('hidden');
  titleScreen.classList.remove('hidden');

  pauseBtn.addEventListener('click', ()=>pauseGame(false));
  resumeBtn.addEventListener('click', ()=>{
    ensureAudio();
    playSound('button');
    resumeGameWithCountdown();
  });

  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden && running && !paused && !countdownInProgress){
      pauseGame(true);
    }
  });

  window.addEventListener('blur', ()=>{
    if(running && !paused && !countdownInProgress){
      pauseGame(true);
    }
  });

  startBtn.addEventListener('click', ()=>{
    ensureAudio();
    playSound('button');
    startGameWithCountdown();
  });

})();
</script>
</body>
</html>
